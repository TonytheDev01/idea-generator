name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject API key into config.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "'use strict';" > config.js
          echo "window.ENV = {" >> config.js
          echo "  GROQ_API_KEY: '${GROQ_API_KEY}'," >> config.js
          echo "  NODE_ENV: 'production'" >> config.js
          echo "};" >> config.js

      - name: Verify config.js was created
        run: |
          echo "=== config.js contents ==="
          cat config.js
          echo "=========================="

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4